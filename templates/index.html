<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Currency Converter</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: #0f0f0f;
            color: #ffffff;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }
        .card {
            background: #1a1a1a;
            padding: 40px;
            border-radius: 16px;
            width: 420px;
            border: 1px solid #2a2a2a;
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
        }
        h1 { font-size: 22px; }
        a { color: #888; font-size: 13px; text-decoration: none; }
        a:hover { color: #fff; }
        label { font-size: 13px; color: #888; margin-bottom: 6px; display: block; }
        input {
            width: 100%;
            padding: 12px 16px;
            background: #0f0f0f;
            border: 1px solid #2a2a2a;
            border-radius: 8px;
            color: #fff;
            font-size: 16px;
            margin-bottom: 16px;
        }
        .row { display: flex; gap: 12px; }
        .row input { width: 50%; }
        button {
            width: 100%;
            padding: 12px;
            background: #4f46e5;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }
        button:hover { background: #4338ca; }
        .result {
            margin-top: 24px;
            padding: 20px;
            background: #0f0f0f;
            border-radius: 12px;
            text-align: center;
            border: 1px solid #2a2a2a;
        }
        .result .amount { font-size: 28px; font-weight: bold; color: #4f46e5; }
        .result .label { font-size: 13px; color: #888; margin-top: 4px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="header">
            <h1>💱 Currency Converter</h1>
            <a href="/logout">Logout</a>
        </div>
        <form method="POST" action="/convert">
            <label>Amount</label>
            <input type="number" name="amount" placeholder="100" value="{{ amount or '' }}">
            <div class="row">
                <div>
                    <label>From</label>
                    <input type="text" name="base" placeholder="EUR" maxlength="3" value="{{ base or '' }}">
                </div>
                <div>
                    <label>To</label>
                    <input type="text" name="target" placeholder="USD" maxlength="3" value="{{ target or '' }}">
                </div>
            </div>
            <button type="submit">Convert</button>
        </form>
        {% if result %}
        <div class="result">
            <div class="amount">{{ result }} {{ target }}</div>
            <div class="label">{{ amount }} {{ base }} at current rate</div>
        </div>
        {% endif %}
    </div>
</body>
</html>
